services:
  - type: web
    name: dharmesh-ahir-portfolio
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 26.2.0
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    plan: free
